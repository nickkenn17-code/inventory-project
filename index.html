<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory Management</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        tr:hover { background-color: #f5f5f5; cursor: pointer; }
        dialog { padding: 20px; border-radius: 8px; border: 1px solid #ccc; width: 300px;}
        .form-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 5px; }
    </style>
</head>
<body>

    <h2>Inventory Dashboard</h2>
    <button onclick="document.getElementById('createModal').showModal()">Create New Item</button>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Short Name</th>
                <th>Price (IDR)</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody id="inventoryTableBody">
            </tbody>
    </table>

    <dialog id="createModal">
        <h3>Create Item</h3>
        <div class="form-group"><label>Short Name</label><input type="text" id="createName"></div>
        <div class="form-group"><label>Description</label><textarea id="createDesc"></textarea></div>
        <div class="form-group"><label>Price (IDR)</label><input type="number" id="createPrice"></div>
        <div class="form-group"><label>Amount</label><input type="number" id="createAmount"></div>
        <button onclick="createItem()">Save</button>
        <button onclick="document.getElementById('createModal').close()">Cancel</button>
    </dialog>

    <dialog id="viewEditModal">
        <h3 id="modalTitle">View Item</h3>
        <input type="hidden" id="editId">
        <div class="form-group"><label>Short Name</label><input type="text" id="editName" disabled></div>
        <div class="form-group"><label>Description</label><textarea id="editDesc" disabled></textarea></div>
        <div class="form-group"><label>Price (IDR)</label><input type="number" id="editPrice" disabled></div>
        <div class="form-group"><label>Amount</label><input type="number" id="editAmount" disabled></div>
        
        <div id="viewButtons">
            <button onclick="enableEditing()">Edit</button>
            <button onclick="confirmDelete()">Delete</button>
            <button onclick="closeViewModal()">Close</button>
        </div>
        <div id="editButtons" style="display: none;">
            <button onclick="saveEdit()">Save</button>
            <button onclick="closeViewModal()">Cancel</button>
        </div>
    </dialog>

    <script>
        const API_URL = "http://localhost:8000";

        // Load List View
        async function fetchItems() {
            const response = await fetch(`${API_URL}/items`);
            const items = await response.json();
            const tbody = document.getElementById('inventoryTableBody');
            tbody.innerHTML = "";
            items.forEach(item => {
                const tr = document.createElement('tr');
                tr.onclick = () => openViewModal(item.id);
                tr.innerHTML = `<td>${item.id}</td><td>${item.short_name}</td><td>${item.price}</td><td>${item.amount}</td>`;
                tbody.appendChild(tr);
            });
        }

        // Create
        async function createItem() {
            const payload = {
                short_name: document.getElementById('createName').value,
                description: document.getElementById('createDesc').value,
                price: parseInt(document.getElementById('createPrice').value),
                amount: parseInt(document.getElementById('createAmount').value)
            };
            await fetch(`${API_URL}/item`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            document.getElementById('createModal').close();
            fetchItems();
        }

        // Read/View
        async function openViewModal(id) {
            const response = await fetch(`${API_URL}/item/${id}`);
            const item = await response.json();
            
            document.getElementById('editId').value = item.id;
            document.getElementById('editName').value = item.short_name;
            document.getElementById('editDesc').value = item.description;
            document.getElementById('editPrice').value = item.price;
            document.getElementById('editAmount').value = item.amount;
            
            disableEditing();
            document.getElementById('viewEditModal').showModal();
        }

        // Toggle Edit Mode
        function enableEditing() {
            document.getElementById('modalTitle').innerText = "Edit Item";
            document.querySelectorAll('#viewEditModal input:not([type="hidden"]), #viewEditModal textarea').forEach(el => el.disabled = false);
            document.getElementById('viewButtons').style.display = "none";
            document.getElementById('editButtons').style.display = "block";
        }

        function disableEditing() {
            document.getElementById('modalTitle').innerText = "View Item";
            document.querySelectorAll('#viewEditModal input:not([type="hidden"]), #viewEditModal textarea').forEach(el => el.disabled = true);
            document.getElementById('viewButtons').style.display = "block";
            document.getElementById('editButtons').style.display = "none";
        }

        function closeViewModal() {
            document.getElementById('viewEditModal').close();
            disableEditing();
        }

        // Update
        async function saveEdit() {
            const id = document.getElementById('editId').value;
            const payload = {
                short_name: document.getElementById('editName').value,
                description: document.getElementById('editDesc').value,
                price: parseInt(document.getElementById('editPrice').value),
                amount: parseInt(document.getElementById('editAmount').value)
            };
            await fetch(`${API_URL}/item/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            closeViewModal();
            fetchItems();
        }

        // Delete
        async function confirmDelete() {
            if (confirm("Are you sure you want to delete this item?")) { // Delete Confirmation Modal
                const id = document.getElementById('editId').value;
                await fetch(`${API_URL}/item/${id}`, { method: "DELETE" });
                closeViewModal();
                fetchItems();
            }
        }

        // Initialize table on load
        fetchItems();
    </script>
</body>
</html>
